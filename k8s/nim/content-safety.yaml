apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-content-safety
  namespace: nim-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nim-content-safety
  template:
    metadata:
      labels:
        app: nim-content-safety
        prometheus.io/scrape: "true"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A10
      containers:
        - name: nim
          image: nvcr.io/nvidia/nemo/nemoguard-content-safety:latest
          ports:
            - containerPort: 8000
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "0"
            - name: NIM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nim-credentials
                  key: api_key
          resources:
            limits:
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nim-content-safety
  namespace: nim-services
  labels:
    prometheus.io/scrape: "true"
spec:
  selector:
    app: nim-content-safety
  ports:
    - port: 8000
      targetPort: 8000